<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsMind AI</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div id="bg"></div>

  <header>
    <h1>SportsMind AI</h1>
    <p>Ask Anything About Cricket & Football</p>
  </header>

  <main>
    <div id="chat-container">
      <div id="chat-box"></div>
      <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your question..." />
        <button id="send-btn">Send</button>
      </div>
    </div>

    <section id="premium">
      <h2>Premium 50% Launch Offer: ₹500</h2>
      <p>Unlimited questions + advanced stats, predictions & tactical analysis!</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
