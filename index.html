<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsMind AI</title>
<style>
  body {
    background: black;
    color: #0ff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #0ff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  }

  #chat-box {
    width: 90%;
    max-width: 700px;
    height: 500px;
    overflow-y: auto;
    border: 2px solid #0ff;
    padding: 15px;
    background: rgba(0,0,0,0.9);
    box-shadow: 0 0 20px #0ff;
    margin-bottom: 20px;
  }

  .user-msg, .ai-msg {
    margin: 10px 0;
    padding: 8px 12px;
    border-radius: 8px;
  }

  .user-msg {
    background: rgba(0,255,255,0.2);
    color: #0ff;
    text-align: right;
  }

  .ai-msg {
    background: rgba(0,255,255,0.1);
    color: #0ff;
    text-align: left;
  }

  #user-input {
    width: 70%;
    padding: 12px;
    background: #111;
    color: #0ff;
    border: 2px solid #0ff;
    border-radius: 8px;
    font-size: 16px;
  }

  #send-btn {
    padding: 12px 20px;
    background: #0ff;
    color: black;
    border: none;
    margin-left: 10px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  #send-btn:hover {
    background: #00bfbf;
    transform: scale(1.05);
  }

  /* Neon flicker animation for chat-box */
  #chat-box, #user-input, #send-btn {
    animation: neonFlicker 1.5s infinite alternate;
  }

  @keyframes neonFlicker {
    0% { box-shadow: 0 0 5px #0ff; }
    50% { box-shadow: 0 0 20px #0ff; }
    100% { box-shadow: 0 0 10px #0ff; }
  }
</style>
</head>
<body>

<h1>🕹 SportsMind AI</h1>

<div id="chat-box"></div>

<div style="display:flex; width:90%; max-width:700px;">
  <input type="text" id="user-input" placeholder="Ask cricket or football question...">
  <button id="send-btn">Send</button>
</div>

<script>
// Frontend JS to call Vercel backend
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

sendBtn.addEventListener('click', async () => {
  const question = userInput.value.trim();
  if (!question) return;

  // Show user's message
  const userMsg = document.createElement('div');
  userMsg.classList.add('user-msg');
  userMsg.innerHTML = `<strong>You:</strong> ${question}`;
  chatBox.appendChild(userMsg);

  userInput.value = '';

  // Show AI typing
  const aiMsg = document.createElement('div');
  aiMsg.classList.add('ai-msg');
  aiMsg.innerHTML = `<strong>SportsMind AI:</strong> Typing...`;
  chatBox.appendChild(aiMsg);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const response = await fetch("https://sportsmind-ai.vercel.app/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    const data = await response.json();
    aiMsg.innerHTML = `<strong>SportsMind AI:</strong> ${data.answer}`;
  } catch (err) {
    aiMsg.innerHTML = `<strong>SportsMind AI:</strong> Error fetching answer.`;
    console.error(err);
  }
});
</script>

</body>
</html>
